<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vynia — Seguimiento de pedido</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4F6867;
      --secondary: #1B1C39;
      --accent: #E1F2FC;
      --bg: #EFE9E4;
      --muted: #A2C2D0;
      --white: #fff;
      --radius: 20px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 15% 60%, rgba(79,104,103,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 25%, rgba(162,194,208,0.09) 0%, transparent 50%);
      color: var(--secondary);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    /* ─── Header ─── */
    .header { text-align: center; margin-bottom: 32px; }
    .header .logo { width: 120px; height: auto; margin-bottom: 8px; opacity: 0.85; }
    .header h1 {
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 22px; font-weight: 700;
      color: var(--secondary); letter-spacing: -0.02em;
    }
    .header p { font-size: 14px; color: #666; margin-top: 4px; }

    /* ─── Search card — Glass ─── */
    .search-card {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: var(--radius);
      padding: 24px 20px;
      box-shadow: 0 8px 32px rgba(27,28,57,0.06), inset 0 1px 0 rgba(255,255,255,0.5);
      margin-bottom: 24px;
    }
    .search-card label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--secondary); margin-bottom: 8px;
    }
    .input-row { display: flex; gap: 8px; }
    .prefix {
      display: flex; align-items: center; justify-content: center;
      background: rgba(245,245,245,0.8); border: 1.5px solid rgba(0,0,0,0.08);
      border-radius: 14px; padding: 0 14px;
      font-size: 15px; font-weight: 600; color: #888; white-space: nowrap;
    }
    .input-row input {
      flex: 1; border: 1.5px solid rgba(0,0,0,0.08); border-radius: 14px;
      padding: 14px 16px; font-size: 17px;
      font-family: 'Roboto Condensed', sans-serif; font-weight: 500;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
      background: rgba(255,255,255,0.5); -webkit-appearance: none;
    }
    .input-row input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,104,103,0.1);
    }
    .input-row input::placeholder { color: #bbb; }
    .search-btn {
      display: block; width: 100%; margin-top: 14px; padding: 14px;
      background: var(--primary); color: var(--white);
      font-size: 15px; font-weight: 700;
      font-family: 'Roboto Condensed', sans-serif; letter-spacing: 0.01em;
      border: none; border-radius: 14px; cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(79,104,103,0.25);
    }
    .search-btn:hover { background: #3d5453; box-shadow: 0 6px 20px rgba(79,104,103,0.3); }
    .search-btn:active { transform: scale(0.97); }
    .search-btn:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }

    /* ─── Loading ─── */
    .loading { text-align: center; padding: 40px 0; color: #888; font-size: 14px; }
    .spinner {
      display: inline-block; width: 28px; height: 28px;
      border: 3px solid #e0e0e0; border-top: 3px solid var(--primary);
      border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Error / Empty ─── */
    .message {
      text-align: center; padding: 32px 20px;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(27,28,57,0.06);
    }
    .message .icon { font-size: 36px; margin-bottom: 10px; }
    .message .text { font-size: 14px; color: #666; line-height: 1.5; }

    /* ─── Results ─── */
    .results-header {
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 16px; font-weight: 700;
      color: var(--secondary); margin-bottom: 14px;
    }
    .results-header span { color: var(--primary); }

    /* ─── Pedido Card — Glass ─── */
    .pedido-card {
      position: relative;
      overflow: hidden;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: var(--radius);
      padding: 22px 24px 20px;
      margin-bottom: 16px;
      box-shadow:
        0 8px 32px rgba(27,28,57,0.06),
        0 2px 8px rgba(27,28,57,0.04),
        inset 0 1px 0 rgba(255,255,255,0.6),
        inset 0 -1px 0 rgba(0,0,0,0.02);
      animation: cardSlideUp 0.6s cubic-bezier(0.33,1,0.68,1) both;
    }
    .card-accent {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }

    @keyframes cardSlideUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .pedido-card.complete { opacity: 0.5; }
    .pedido-card.complete:hover { opacity: 0.7; transition: opacity 0.3s; }

    .pedido-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 2px;
    }
    .pedido-num {
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 15px; font-weight: 700; color: var(--secondary);
    }
    .pedido-fecha { font-size: 12px; color: #999; font-weight: 500; }

    /* ─── Half-circle Gauge ─── */
    .gauge-wrapper {
      position: relative;
      text-align: center;
      padding: 12px 0 0;
    }
    .gauge-svg {
      display: block; margin: 0 auto;
      width: 200px; max-width: 65%;
      height: auto;
    }
    .gauge-track { stroke: rgba(0,0,0,0.06); }

    .gauge-display {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      text-align: center;
      padding-bottom: 4px;
    }
    .gauge-state {
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 21px; font-weight: 700; line-height: 1.2;
      opacity: 0; transform: translateY(8px);
      animation: labelReveal 0.5s cubic-bezier(0.33,1,0.68,1) forwards;
      animation-delay: calc(0.9s + var(--stagger, 0ms));
    }
    .gauge-subtitle {
      font-size: 11px; color: #999;
      text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500;
      margin-top: 1px;
      opacity: 0;
      animation: labelReveal 0.4s cubic-bezier(0.33,1,0.68,1) forwards;
      animation-delay: calc(1.1s + var(--stagger, 0ms));
    }
    @keyframes labelReveal {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Special state (No acude / Incidencia) ─── */
    .estado-special { text-align: center; padding: 20px 0 12px; }
    .estado-special-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 56px; height: 56px; border-radius: 50%;
      font-size: 22px; font-weight: 700; margin-bottom: 10px;
      opacity: 0; transform: scale(0.7);
      animation: iconPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
      animation-delay: calc(0.5s + var(--stagger, 0ms));
    }
    @keyframes iconPop {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }
    .estado-special-label {
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 18px; font-weight: 700;
      opacity: 0;
      animation: labelReveal 0.4s cubic-bezier(0.33,1,0.68,1) forwards;
      animation-delay: calc(0.7s + var(--stagger, 0ms));
    }

    /* ─── Products list ─── */
    .productos-section {
      border-top: 1px solid rgba(0,0,0,0.06);
      padding-top: 14px; margin-top: 14px;
    }
    .productos-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: #b0b0b0; margin-bottom: 8px;
    }
    .producto-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 7px 0;
    }
    .producto-row + .producto-row { border-top: 1px solid rgba(0,0,0,0.03); }
    .producto-nombre { font-size: 14px; color: var(--secondary); }
    .producto-qty {
      font-family: 'Roboto Condensed', sans-serif;
      font-weight: 700; font-size: 13px;
      color: var(--primary);
      background: rgba(79,104,103,0.08);
      padding: 3px 12px; border-radius: 10px;
    }

    /* ─── Footer ─── */
    .footer { text-align: center; margin-top: 40px; font-size: 12px; color: #aaa; }

    /* ─── Iframe embed mode ─── */
    body.embedded { background: transparent; background-image: none; }
    body.embedded .container { padding-top: 8px; }
    body.embedded .header { margin-bottom: 20px; }
    body.embedded .header .logo { display: none; }
    body.embedded .footer { display: none; }

    /* ─── Google Review CTA ─── */
    .review-cta {
      display: block;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #4F6867 0%, #3a4f4e 100%);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 12px;
      box-shadow:
        0 8px 32px rgba(27,28,57,0.10),
        0 2px 8px rgba(79,104,103,0.15),
        inset 0 1px 0 rgba(255,255,255,0.12);
      animation: cardSlideUp 0.6s cubic-bezier(0.33,1,0.68,1) both;
      cursor: pointer;
      transition: transform 0.25s cubic-bezier(0.33,1,0.68,1), box-shadow 0.25s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .review-cta:hover {
      transform: scale(1.02) translateY(-2px);
      box-shadow:
        0 12px 40px rgba(79,104,103,0.25),
        0 4px 12px rgba(79,104,103,0.2),
        inset 0 1px 0 rgba(255,255,255,0.15);
    }
    .review-cta:active { transform: scale(0.98); }

    .review-cta::before {
      content: '';
      position: absolute;
      top: 0; left: -100%; right: 0; bottom: 0;
      width: 200%;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.12) 45%, rgba(255,255,255,0.06) 50%, transparent 55%);
      transition: transform 0.7s ease;
      transform: translateX(0%);
      pointer-events: none;
    }
    .review-cta:hover::before { transform: translateX(60%); }

    .review-cta::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      background: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.1) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .review-cta:hover::after { opacity: 1; }

    .review-cta-inner {
      position: relative; z-index: 1;
      display: flex; align-items: center; gap: 14px;
    }
    .review-cta-icon {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      width: 44px; height: 44px; border-radius: 12px;
      background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.06) 100%);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .review-cta-text { flex: 1; min-width: 0; }
    .review-cta-title {
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 16px; font-weight: 700; color: #fff;
      letter-spacing: -0.01em; line-height: 1.2;
    }
    .review-cta-subtitle {
      font-size: 12px; color: rgba(255,255,255,0.65);
      margin-top: 2px; line-height: 1.3;
    }
    .review-cta-arrow {
      flex-shrink: 0; color: rgba(255,255,255,0.5);
      transition: transform 0.25s ease, color 0.25s ease;
    }
    .review-cta:hover .review-cta-arrow {
      transform: translateX(3px); color: rgba(255,255,255,0.8);
    }
    @media print { .review-cta { display: none; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img class="logo" src="/logovynia2_azul.png" alt="Vynia — Obrador sin gluten" />
      <h1>Seguimiento de pedido</h1>
      <p>Introduce tu teléfono para ver el estado</p>
    </div>

    <div class="search-card">
      <label for="tel">Número de teléfono</label>
      <div class="input-row">
        <div class="prefix">+34</div>
        <input type="tel" id="tel" placeholder="612 345 678" maxlength="12" inputmode="numeric" autocomplete="tel" />
      </div>
      <button class="search-btn" id="searchBtn" onclick="buscar()">Consultar pedido</button>
    </div>

    <div id="results"></div>

    <div class="footer">
      Vynia &mdash; Pastelería y panadería sin gluten
    </div>
  </div>

  <script>
    const API_BASE = location.hostname === "vynia-mngmnt.vercel.app"
      ? "" : "https://vynia-mngmnt.vercel.app";

    const ESTADOS_CONFIG = {
      "Sin empezar": {
        color: "#8B8B8B", bg: "#F0F0F0", icon: "○",
        label: "Pendiente", subtitle: "pedido recibido",
        progress: 0,
        gradient: ["#C0C0C0", "#8B8B8B"]
      },
      "En preparación": {
        color: "#1565C0", bg: "#E3F2FD", icon: "◐",
        label: "Preparando", subtitle: "en proceso",
        progress: 0.33,
        gradient: ["#90CAF9", "#1565C0", "#0D47A1"]
      },
      "Listo para recoger": {
        color: "#E65100", bg: "#FFF3E0", icon: "●",
        label: "¡Listo!", subtitle: "pasa a recoger",
        progress: 0.66,
        gradient: ["#FFCC80", "#FF9800", "#E65100"]
      },
      "Recogido": {
        color: "#2E7D32", bg: "#E8F5E9", icon: "✓",
        label: "Recogido", subtitle: "entregado",
        progress: 1.0,
        gradient: ["#A5D6A7", "#4CAF50", "#2E7D32"]
      },
      "No acude": {
        color: "#C62828", bg: "#FFEBEE", icon: "✗",
        label: "No acude", subtitle: "",
        progress: -1,
        gradient: ["#EF9A9A", "#C62828"]
      },
      "Incidencia": {
        color: "#795548", bg: "#FDE8E5", icon: "!",
        label: "Incidencia", subtitle: "",
        progress: -1,
        gradient: ["#BCAAA4", "#795548"]
      }
    };

    const PIPELINE = ["Sin empezar", "En preparación", "Listo para recoger", "Recogido"];

    function buscar() {
      const tel = document.getElementById("tel").value.replace(/\D/g, "");
      if (tel.length < 6) {
        showMessage("📱", "Introduce un número de teléfono válido");
        return;
      }

      const btn = document.getElementById("searchBtn");
      btn.disabled = true;
      btn.textContent = "Buscando...";

      document.getElementById("results").innerHTML =
        '<div class="loading"><div class="spinner"></div><div>Consultando pedidos...</div></div>';

      fetch(API_BASE + "/api/tracking?tel=" + encodeURIComponent(tel))
        .then(r => r.json())
        .then(data => {
          btn.disabled = false;
          btn.textContent = "Consultar pedido";

          if (data.error) {
            showMessage("⚠️", data.error);
            return;
          }
          if (!data.pedidos || data.pedidos.length === 0) {
            showMessage("🔍", "No se encontraron pedidos para este número de teléfono. Comprueba que el número es correcto.");
            return;
          }

          renderPedidos(data.cliente, data.pedidos);
        })
        .catch(() => {
          btn.disabled = false;
          btn.textContent = "Consultar pedido";
          showMessage("⚠️", "Error de conexión. Inténtalo de nuevo.");
        });
    }

    function showMessage(icon, text) {
      document.getElementById("results").innerHTML =
        '<div class="message"><div class="icon">' + icon + '</div><div class="text">' + text + '</div></div>';
    }

    function formatFecha(f) {
      if (!f) return "";
      const d = new Date(f);
      const dias = ["Dom", "Lun", "Mar", "Mié", "Jue", "Vie", "Sáb"];
      const meses = ["ene", "feb", "mar", "abr", "may", "jun", "jul", "ago", "sep", "oct", "nov", "dic"];
      let str = dias[d.getDay()] + " " + d.getDate() + " " + meses[d.getMonth()];
      if (f.includes("T")) {
        str += " · " + d.getHours().toString().padStart(2, "0") + ":" + d.getMinutes().toString().padStart(2, "0");
      }
      return str;
    }

    function renderPedidos(cliente, pedidos) {
      let html = '<div class="results-header">Pedidos de <span>' + escapeHtml(cliente) + '</span></div>';

      // Google Review CTA
      html += '<a class="review-cta" href="https://g.page/r/Ceetj32kIx45EBM/review" '
        + 'target="_blank" rel="noopener noreferrer">';
      html += '<div class="review-cta-inner">';
      html += '<div class="review-cta-icon">'
        + '<svg width="22" height="22" viewBox="0 0 24 24" fill="#FBBC04" stroke="#F9A825" stroke-width="0.5">'
        + '<path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/>'
        + '</svg></div>';
      html += '<div class="review-cta-text">'
        + '<div class="review-cta-title">D\u00e9janos tu opini\u00f3n</div>'
        + '<div class="review-cta-subtitle">Tu rese\u00f1a nos ayuda a crecer</div>'
        + '</div>';
      html += '<div class="review-cta-arrow">'
        + '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">'
        + '<polyline points="9 18 15 12 9 6"/></svg></div>';
      html += '</div></a>';

      pedidos.forEach((ped, i) => {
        const estado = ped.estado || "Sin empezar";
        const cfg = ESTADOS_CONFIG[estado] || ESTADOS_CONFIG["Sin empezar"];
        const isComplete = estado === "Recogido" || estado === "No acude" || estado === "Incidencia";
        const isStandardFlow = PIPELINE.includes(estado);
        const stagger = i * 150;

        html += '<div class="pedido-card' + (isComplete ? ' complete' : '') +
          '" style="animation-delay:' + stagger + 'ms; --stagger:' + stagger + 'ms">';
        html += '<div class="card-accent" style="background:' + cfg.color + '"></div>';

        // Header
        html += '<div class="pedido-header">';
        html += '<div class="pedido-num">Pedido #' + ped.numPedido + '</div>';
        html += '<div class="pedido-fecha">' + formatFecha(ped.fecha) + '</div>';
        html += '</div>';

        // Gauge or special badge
        if (isStandardFlow) {
          html += renderGauge(estado, cfg, ped.numPedido || i, stagger);
        } else {
          html += renderSpecialState(cfg);
        }

        // Products
        if (ped.productos && ped.productos.length > 0) {
          html += '<div class="productos-section"><div class="productos-title">Productos</div>';
          ped.productos.forEach(function(prod) {
            html += '<div class="producto-row">';
            html += '<span class="producto-nombre">' + escapeHtml(prod.nombre) + '</span>';
            html += '<span class="producto-qty">x' + prod.unidades + '</span>';
            html += '</div>';
          });
          html += '</div>';
        }

        html += '</div>';
      });

      document.getElementById("results").innerHTML = html;

      // Animate gauge strokes after DOM update
      requestAnimationFrame(function() { animateGauges(); });
    }

    function renderGauge(estado, cfg, id, stagger) {
      var radius = 45;
      var half = Math.PI * radius; // circumference / 2
      var gradId = 'gauge-grad-' + id;

      var stops = cfg.gradient.map(function(c, i, a) {
        var offset = a.length > 1 ? (100 / (a.length - 1)) * i : 0;
        return '<stop offset="' + offset + '%" stop-color="' + c + '" />';
      }).join('');

      var html = '<div class="gauge-wrapper">';
      html += '<svg class="gauge-svg" viewBox="0 0 100 50" aria-hidden="true">';
      html += '<defs><linearGradient id="' + gradId + '" x1="0" y1="0" x2="1" y2="0">' + stops + '</linearGradient></defs>';
      html += '<g fill="none" stroke-width="8" transform="translate(50,50.5)">';
      html += '<circle class="gauge-track" r="' + radius + '" />';
      html += '<circle class="gauge-fill" data-progress="' + cfg.progress + '" data-stagger="' + stagger +
        '" r="' + radius + '" stroke="url(#' + gradId + ')" stroke-dasharray="' + half + ' ' + half +
        '" stroke-linecap="round" />';
      html += '</g></svg>';

      // Label display inside the gauge
      html += '<div class="gauge-display">';
      html += '<div class="gauge-state" style="color:' + cfg.color + '">' + cfg.label + '</div>';
      html += '<div class="gauge-subtitle">' + cfg.subtitle + '</div>';
      html += '</div>';

      html += '</div>';
      return html;
    }

    function renderSpecialState(cfg) {
      var html = '<div class="estado-special">';
      html += '<div class="estado-special-icon" style="background:' + cfg.bg + ';color:' + cfg.color + '">' + cfg.icon + '</div>';
      html += '<div class="estado-special-label" style="color:' + cfg.color + '">' + cfg.label + '</div>';
      html += '</div>';
      return html;
    }

    function animateGauges() {
      document.querySelectorAll('.gauge-fill').forEach(function(el, i) {
        var progress = parseFloat(el.dataset.progress);
        var stagger = parseInt(el.dataset.stagger) || 0;
        var half = Math.PI * 45;
        var target = -progress * half;

        if (el.animate) {
          el.animate([
            { strokeDashoffset: '0', offset: 0 },
            { strokeDashoffset: '0', offset: 0.28 },
            { strokeDashoffset: String(target) }
          ], {
            duration: 1400,
            delay: stagger,
            easing: 'cubic-bezier(0.65, 0, 0.35, 1)',
            fill: 'forwards'
          });
        } else {
          // Fallback for browsers without Web Animations API
          el.style.strokeDashoffset = target;
        }
      });
    }

    function escapeHtml(str) {
      if (!str) return "";
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    // Enter key triggers search
    document.getElementById("tel").addEventListener("keydown", function(e) {
      if (e.key === "Enter") buscar();
    });

    // Detect iframe embed
    if (window !== window.top) {
      document.body.classList.add("embedded");
    }
  </script>
</body>
